[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 800
via_ir = true
evm_version = "cancun"
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]
fs_permissions = [{ access = "read", path = "./out" }]

[fmt]
line_length = 100
tab_width = 4
quote_style = "double"
bracket_spacing = true
int_types = "long"
multiline_func_header = "params_first"
sort_imports = true

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"
monad_mainnet = "https://rpc.monad.xyz"
local         = "http://127.0.0.1:8545"

[etherscan]
monad_testnet = { key = "any", url = "https://testnet.monadexplorer.com/api" }
monad_mainnet = { key = "any", url = "https://monadexplorer.com/api" }
